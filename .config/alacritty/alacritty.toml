general.live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
size = 12

[font.normal]
family = "MonoLisa Nerd Font"

[font.offset]
y = 1

[window]
option_as_alt = "Both"
padding = { x = 4, y = 2 }

startup_mode = "Maximized"
dynamic_title = false

[terminal]
shell = { program = "/bin/zsh", args = [
  "-l",
  "-c",
  "tmux a || tmux new -s home",
] }
