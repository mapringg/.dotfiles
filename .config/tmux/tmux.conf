# Use homebrew bash on macOS only
if-shell "uname | grep -q Darwin" {
  set -g default-command /opt/homebrew/bin/bash
  set -g default-shell /opt/homebrew/bin/bash
}

# Start windows/panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Mouse support
set -g mouse on

# Increase history
set -g history-limit 10000

# Faster escape time (important for vim/neovim)
set -sg escape-time 10

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Default keys but preserve current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# Hide right status
set -g status-right ""
