git:
  pagers:
    - colorArg: always
      pager: >
        delta
        --dark
        --paging=never
        --hunk-header-decoration-style=plain
        --hunk-header-style="file line-number syntax"
        --file-decoration-style=plain
        --file-style="omit"

gui:
  nerdFontsVersion: "3"
  showIcons: true
  theme:
    activeBorderColor:
      - "#89b4fa"
      - bold
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#89b4fa"
    defaultFgColor:
      - "#cdd6f4"
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    searchingActiveBorderColor:
      - "#f9e2af"
    selectedLineBgColor:
      - "#313244"
    unstagedChangesColor:
      - "#f38ba8"
