gui:
  theme:
    activeBorderColor:
      - "#89b4fa"
      - bold
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#89b4fa"
    defaultFgColor:
      - "#cdd6f4"
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    searchingActiveBorderColor:
      - "#f9e2af"
    selectedLineBgColor:
      - "#313244"
    unstagedChangesColor:
      - "#f38ba8"

customCommands:
  - key: "<c-a>"
    description: "Generate commit message with AI"
    context: "files"
    command: >-
      bash -c "git diff --cached | codex exec --ephemeral -m gpt-5.4-mini 'Generate a single-line commit message for this diff. Use Conventional Commits format (feat:, fix:, chore:, docs:, refactor:). Output ONLY the raw commit message. No quotes, no explanation, no period at the end.' 2>/dev/null | tee >(pbcopy)"
    loadingText: "Generating commit message..."
    output: popup
