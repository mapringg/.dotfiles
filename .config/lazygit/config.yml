customCommands:
  - key: "<c-a>"
    description: "AI commit (staged)"
    context: "files"
    command: "~/.local/bin/git-ai-commit.sh commit"
    loadingText: "Generating commit message and committing..."
    output: log
  - key: "<c-a>"
    description: "Regenerate commit message with AI"
    context: "commits"
    command: "~/.local/bin/git-ai-commit.sh regenerate {{.SelectedLocalCommit.Sha}}"
    loadingText: "Regenerating commit message..."
    output: popup
