gui:
  showBottomLine: false
  theme:
    activeBorderColor:
      - "#89b4fa"
      - bold
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#89b4fa"
    defaultFgColor:
      - "#cdd6f4"
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    searchingActiveBorderColor:
      - "#f9e2af"
    selectedLineBgColor:
      - "#313244"
    unstagedChangesColor:
      - "#f38ba8"

customCommands:
  - key: "<c-a>"
    description: "Generate commit message with AI"
    context: "files"
    command: >-
      bash -c "git diff --cached | pi -p --no-session --no-tools --no-extensions --no-skills --no-prompt-templates --thinking off --system-prompt 'You generate git commit messages. Respond with exactly one single-line Conventional Commit message and nothing else. No bullets, no quotes, no explanation, no markdown, no trailing period.' --model openai-codex/gpt-5.4-mini 'Generate a commit message for this diff. Allowed types: feat, fix, chore, docs, refactor. Output ONLY the raw commit message.' 2>/dev/null | tee >(clipboard-copy)"
    loadingText: "Generating commit message..."
    output: popup
  - key: "<c-a>"
    description: "Generate commit message for selected commit with AI"
    context: "commits"
    command: >-
      bash -c "git show --stat --patch {{.SelectedLocalCommit.Hash}} | pi -p --no-session --no-tools --no-extensions --no-skills --no-prompt-templates --thinking off --system-prompt 'You generate git commit messages. Respond with exactly one single-line Conventional Commit message and nothing else. No bullets, no quotes, no explanation, no markdown, no trailing period.' --model openai-codex/gpt-5.4-mini 'Generate a better commit message for this commit. Allowed types: feat, fix, chore, docs, refactor. Output ONLY the raw commit message.' 2>/dev/null | tee >(clipboard-copy)"
    loadingText: "Generating commit message..."
    output: popup
